<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Registrar Productor · Rescate Lácteo</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header>
    <div class="logo"><span class="emoji">🥛</span> Rescate Lácteo</div>
    <nav>
      <ul>
        <li><a href="index.html">Inicio</a></li>
        <li><a href="solucion.html">Productores</a></li>
        <li><a href="registro.html" class="activo">Registrar</a></li>
      </ul>
    </nav>
  </header>

  <main class="container">
    <section class="encabezado-pagina">
      <h1>Registrar Productor</h1>
    </section>

    <div class="contenedor-principal" style="display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start;">
      <div class="columna-formulario">
        <form id="form-productor" class="formulario" novalidate>
          <div class="grupo-campo">
            <label for="nombre">Nombre completo</label>
            <input id="nombre" name="nombre" type="text" required minlength="3">
            <div class="mensaje-error" id="error-nombre" style="display:none"></div>
          </div>

          <div class="grupo-campo">
            <label for="comunidad">Comunidad</label>
            <select id="comunidad" name="comunidad" required>
              <option value="">Seleccione...</option>
              <option>Cabeceras de Tilarán</option>
              <option>Tronadora</option>
              <option>El Dos</option>
              <option>La Florida</option>
              <option>Quebrada Grande</option>
              <option>Río Chiquito</option>
            </select>
            <div class="mensaje-error" id="error-comunidad" style="display:none"></div>
          </div>

          <div class="grupo-campo">
            <label for="produccion">Producción diaria (litros)</label>
            <input id="produccion" name="produccion" type="number" min="1" max="9999" required>
            <div class="mensaje-error" id="error-produccion" style="display:none"></div>
          </div>

          <div class="grupo-campo">
            <label for="producto">Producto principal</label>
            <select id="producto" name="producto" required>
              <option value="">Seleccione...</option>
              <option>Leche fresca</option>
              <option>Queso</option>
              <option>Natilla</option>
              <option>Mantequilla</option>
              <option>Yogurt</option>
              <option>Helados artesanales</option>
            </select>
            <div class="mensaje-error" id="error-producto" style="display:none"></div>
          </div>

          <div class="grupo-campo">
            <label for="telefono">Teléfono (####-####)</label>
            <input id="telefono" name="telefono" type="text" required>
            <div class="mensaje-error" id="error-telefono" style="display:none"></div>
          </div>

          <div class="grupo-campo">
            <label for="estado">Estado</label>
            <select id="estado" name="estado" required>
              <option value="">Seleccione...</option>
              <option value="activo">activo</option>
              <option value="en dificultad">en dificultad</option>
              <option value="inactivo">inactivo</option>
            </select>
            <div class="mensaje-error" id="error-estado" style="display:none"></div>
          </div>

          <div style="display:flex;gap:8px;">
            <button type="submit" class="btn-primario">💾 Guardar Registro</button>
            <button type="button" id="btn-limpiar" class="btn-secundario">🗑 Limpiar Formulario</button>
          </div>

          <div id="form-mensaje" class="mensaje" style="margin-top:12px;display:none"></div>
        </form>
      </div>

      <div class="columna-registros">
        <section class="lista-registros" id="lista-registros">
          <h2>Registros guardados</h2>
        </section>
      </div>
    </div>

  </main>

  <footer>
    <p>🥛 Rescate Lácteo — Apoyando a los productores de Tilarán</p>
    <p>ISW-521 Programación en Ambiente Web I · UTN · 2026</p>
  </footer>

  <script src="js/registro.js"></script>
</body>
</html>
